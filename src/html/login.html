<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data:; connect-src 'self' http://localhost:8000 ws://localhost:* ws://0.0.0.0:*">    
    <title>Desktop Friend — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 320px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .cat-emoji {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: #888;
            margin-bottom: 24px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }

        .tab {
            flex: 1;
            padding: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #888;
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            color: #FF6B9D;
            border-bottom: 2px solid #FF6B9D;
            font-weight: bold;
        }

        /* Form */
        .form-group {
            margin-bottom: 14px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        input:focus {
            border-color: #FF6B9D;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #FF6B9D;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 6px;
        }

        .btn:hover {
            background: #e55a8a;
        }

        .error {
            color: #ff4444;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }

        .success {
            color: #44bb44;
            font-size: 12px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cat-emoji">🐱</div>
        <h1>Frenz</h1>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" id="login-tab">Login</button>
            <button class="tab" id="register-tab">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Enter username" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter password" />
            </div>
            <button class="btn" id="login-btn">Login</button>
        </div>

        <!-- Register Form -->
        <div id="register-form" style="display: none;">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-username" placeholder="Choose a username" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="Enter email" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Choose a password" />
            </div>
            <button class="btn" id="register-btn">Create Account</button>
        </div>

        <p class="error" id="error-msg"></p>
        <p class="success" id="success-msg"></p>
    </div>
</body>
</html>
